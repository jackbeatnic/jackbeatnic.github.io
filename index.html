<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noimageindex">
    <meta name="description" content="Quiet landscapes and contemplative AI art by Jack Beatnic — photography meets generative intelligence. Polygon, Base, Avalanche &amp; more.">
    <title>Jack Beatnic Gallery — AI Artist &amp; Photographer</title>

    <!-- Open Graph / X (Twitter) link preview -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jackbeatnic.github.io/">
    <meta property="og:title" content="Jack Beatnic Gallery — AI Artist &amp; Photographer">
    <meta property="og:description" content="Quiet landscapes and contemplative works where photography meets generative intelligence. Color, light, and mood — across Polygon, Base, Avalanche &amp; more.">
    <meta property="og:image" content="https://jackbeatnic.github.io/assets/og-preview.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@JackBeatnicAI">
    <meta name="twitter:title" content="Jack Beatnic Gallery">
    <meta name="twitter:description" content="AI art &amp; photography — quiet landscapes across Polygon, Base, Avalanche &amp; more.">
    <meta name="twitter:image" content="https://jackbeatnic.github.io/assets/og-preview.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/gallery.css">
</head>
<body class="gallery-protected">
    <header class="site-header site-header--sticky">
        <div class="site-header__inner">
            <div class="site-brand">
                <h1 class="site-logo">
                    <span class="visually-hidden">Jack Beatnic</span>
                    <div class="signature-logo-wrap" aria-hidden="true">
                        <img src="assets/signature.png"
                             alt=""
                             width="360"
                             height="150"
                             decoding="async"
                             draggable="false"
                             referrerpolicy="no-referrer">
                        <div class="signature-shield"></div>
                    </div>
                </h1>
                <p class="artist-subtitle">Digital Art · NFT</p>
            </div>
            <nav class="site-nav" aria-label="Main">
                <a href="#gallery-root">Works</a>
                <a href="#about">About</a>
                <button type="button" id="tip-open" class="site-nav__tip" aria-expanded="false" aria-controls="tip-panel">Tip</button>
            </nav>
        </div>
        <div id="tip-panel" class="tip-panel" hidden>
            <div class="tip-panel__inner">
                <button type="button" id="tip-close" class="tip-panel__close" aria-label="Close">×</button>
                <p class="tip-panel__title">Tip the artist</p>
                <p class="tip-panel__hint">Send AVAX / ETH / any token to this wallet</p>
                <img id="tip-qr" class="tip-panel__qr" width="140" height="140" alt="">
                <p id="tip-address" class="tip-panel__address"></p>
                <button type="button" id="tip-copy" class="btn btn--ghost btn--small">Copy address</button>
            </div>
        </div>
        <div class="site-header__rule" aria-hidden="true"></div>
    </header>

    <main id="gallery-root" class="main">
        <section class="hero" aria-labelledby="hero-title">
            <div class="hero__media">
                <img id="hero-image"
                     class="hero__image"
                     alt=""
                     width="1280"
                     height="640"
                     decoding="async"
                     draggable="false"
                     referrerpolicy="no-referrer">
                <div class="hero__veil" aria-hidden="true"></div>
            </div>
            <div class="hero__content">
                <h2 id="hero-title" class="hero__title">…</h2>
                <p id="hero-tagline" class="hero__tagline">…</p>
                <p id="hero-description" class="hero__description">…</p>
                <div class="hero__actions">
                    <a href="#explore" class="btn btn--primary">Explore the Gallery</a>
                    <a id="hero-opensea" class="btn btn--ghost" href="https://opensea.io/JackBeatnic" target="_blank" rel="noopener noreferrer">View on OpenSea</a>
                </div>
            </div>
        </section>

        <section id="explore" class="filters-panel" aria-label="Filters">
            <div class="filters-panel__head">
                <span class="filters-panel__title">Explore</span>
                <span id="filter-count" class="filters-panel__count"></span>
                <button type="button" id="reset-filters" class="filters__reset">Clear all</button>
            </div>

            <div class="filters-row">
                <label class="filters-row__label" for="search-filter">Search</label>
                <input type="search" id="search-filter" class="filters-search" placeholder="Name, mood, keyword, color…" autocomplete="off">
            </div>

            <div class="filters-row">
                <label class="filters-row__label" for="category-filter">Category</label>
                <select id="category-filter" class="filters__select" aria-label="Category">
                    <option value="">All categories</option>
                </select>
            </div>

            <div class="filters-row">
                <span class="filters-row__label">Colors</span>
                <div id="color-filters" class="color-filters"></div>
            </div>

            <div class="filters-row">
                <span class="filters-row__label">Mood</span>
                <div id="vibe-filters" class="filters__tags"></div>
            </div>

            <div class="filters-row">
                <span class="filters-row__label">Library</span>
                <div class="filters__tags">
                    <button type="button" id="filter-saved" class="filter-tag saved-filter">Saved for later</button>
                </div>
            </div>
        </section>

        <div id="gallery-grid" class="gallery-grid"></div>

        <section id="about" class="about-section" aria-labelledby="about-title">
            <h2 id="about-title" class="about-section__title">About</h2>
            <div id="about-content" class="about-section__body"></div>
            <p class="about-section__link">
                <a id="about-opensea" class="btn btn--primary" href="https://opensea.io/JackBeatnic" target="_blank" rel="noopener noreferrer">View on OpenSea</a>
            </p>
        </section>

        <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="Artwork preview">
            <button type="button" class="lightbox__close" aria-label="Close">×</button>
            <div class="lightbox__backdrop" aria-hidden="true"></div>
            <figure class="lightbox__figure">
                <img id="lightbox-image" class="lightbox__image" alt="" draggable="false" referrerpolicy="no-referrer">
                <figcaption id="lightbox-caption" class="lightbox__caption"></figcaption>
            </figure>
        </div>

        <footer class="site-footer">
            <p>Jack Beatnic Gallery — 2026</p>
        </footer>
    </main>

    <script src="js/images.js"></script>
    <script src="js/opensea-links.js"></script>
    <script src="js/lightbox.js"></script>
    <script src="js/likes.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/tip.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
